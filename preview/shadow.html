<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_preview-base.css" />
    <style></style>
  </head>
  <body>
    <div class="card">
      <div class="ra-eyebrow">ELEVATION · BORDER-FIRST</div>
      <div class="row" style="gap: 20px">
        <div class="col" style="gap: 8px; align-items: center">
          <div
            style="
              width: 150px;
              height: 80px;
              background: #fff;
              border: 1px solid var(--border-default);
              border-radius: 16px;
              box-shadow: var(--shadow-sm);
            "
          ></div>
          <span class="mono">rest</span>
          <span class="label" style="font-size: 10px">cards · 1px border</span>
        </div>
        <div class="col" style="gap: 8px; align-items: center">
          <div
            style="
              width: 150px;
              height: 80px;
              background: #fff;
              border: 1px solid var(--primary-300);
              border-radius: 16px;
              box-shadow: var(--shadow-lift);
            "
          ></div>
          <span class="mono">hover-sm</span>
          <span class="label" style="font-size: 10px">border→p-300 · hover:shadow-sm</span>
        </div>
        <div class="col" style="gap: 8px; align-items: center">
          <div
            style="width: 150px; height: 44px; background: var(--primary-600); border-radius: 8px"
          ></div>
          <span class="mono">button rest</span>
          <span class="label" style="font-size: 10px">no shadow</span>
        </div>
        <div class="col" style="gap: 8px; align-items: center">
          <div
            style="width: 150px; height: 44px; background: var(--primary-700); border-radius: 8px"
          ></div>
          <span class="mono">button hover</span>
          <span class="label" style="font-size: 10px">p-700 · no lift</span>
        </div>
      </div>
    </div>
  </body>
</html>
